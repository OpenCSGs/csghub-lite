name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.22"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web UI (required for go:embed)
        shell: bash
        run: |
          set -e
          (cd web && npm ci && npm run build)
          rm -rf internal/server/static/assets \
            internal/server/static/*.html \
            internal/server/static/*.js \
            internal/server/static/*.css \
            internal/server/static/*.svg 2>/dev/null || true
          mkdir -p internal/server/static
          cp -r web/dist/. internal/server/static/

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Build binary
        run: go build -o bin/csghub-lite ./cmd/csghub-lite

      - name: Verify version flag
        run: ./bin/csghub-lite --version

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web UI (required for go:embed)
        shell: bash
        run: |
          set -e
          (cd web && npm ci && npm run build)
          rm -rf internal/server/static/assets \
            internal/server/static/*.html \
            internal/server/static/*.js \
            internal/server/static/*.css \
            internal/server/static/*.svg 2>/dev/null || true
          mkdir -p internal/server/static
          cp -r web/dist/. internal/server/static/

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  release:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web UI (required for go:embed)
        shell: bash
        run: |
          set -e
          (cd web && npm ci && npm run build)
          rm -rf internal/server/static/assets \
            internal/server/static/*.html \
            internal/server/static/*.js \
            internal/server/static/*.css \
            internal/server/static/*.svg 2>/dev/null || true
          mkdir -p internal/server/static
          cp -r web/dist/. internal/server/static/

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
